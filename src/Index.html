  <style>
    /* ====== Theme Tokens — 桜井電装 Blue + Gold + Sakura ====== */
    :root {
      --bg: #eef2f9;
      --surface: #FFFFFF;
      --primary: #5c7cba;
      --primary-dark: #2c4a7c;
      --sakura: #f0b8c8;
      --sakura-soft: rgba(240, 184, 200, 0.18);
      --gold: #c9a84c;
      --gold-bright: #f6e27a;
      --text: #2E2E2E;
      --text-sub: #6B6B6B;

      --radius: 16px;
      --radius-lg: 22px;
      --shadow-sm: 0 6px 18px rgba(0, 0, 0, 0.08);
      --shadow-md: 0 10px 26px rgba(0, 0, 0, 0.12);
      --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.16);
      --ring: 0 0 0 3px rgba(92, 124, 186, 0.22);
    }

    /* ====== Base ====== */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background:
        radial-gradient(1100px 420px at 20% 0%, rgba(92, 124, 186, 0.15), transparent 60%),
        radial-gradient(900px 360px at 80% 10%, rgba(240, 184, 200, 0.12), transparent 55%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      max-width: 1060px;
      margin: 0 auto;
      padding: 18px 16px 40px;
    }

    /* ====== Header ====== */
    .header {
      position: relative;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(92, 124, 186, 0.30);
      border-radius: var(--radius-lg);
      padding: 18px 18px 14px;
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .headerRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      font-size: 14px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(92, 124, 186, 0.12);
      border: 1px solid rgba(92, 124, 186, 0.25);
      color: var(--primary-dark);
      font-weight: 700;
    }

    /* Header brand subtitle */
    .headerBrand {
      margin-top: 4px;
      font-size: 10px;
      color: var(--gold);
      letter-spacing: 2px;
      font-weight: 700;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid rgba(92, 124, 186, 0.40);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      font-weight: 700;
      font-size: 14px;
      color: var(--primary-dark);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      user-select: none;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.12);
      border-color: var(--gold);
    }

    .btn:active {
      transform: translateY(0px) scale(0.99);
    }

    .btn:focus-visible {
      outline: none;
      box-shadow: var(--ring), 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    /* Gold flow line with shimmer animation */
    .flow {
      margin-top: 12px;
      height: 26px;
      position: relative;
    }

    .flow::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(180px 22px at 15% 50%, rgba(201, 168, 76, 0.35), transparent 70%),
        radial-gradient(220px 26px at 55% 50%, rgba(246, 226, 122, 0.28), transparent 72%),
        radial-gradient(180px 22px at 85% 50%, rgba(201, 168, 76, 0.32), transparent 70%);
      filter: blur(0.2px);
      opacity: 0.9;
      transform: skewX(-10deg);
      animation: flowShimmer 5s ease-in-out infinite;
    }

    @keyframes flowShimmer {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .flow::after {
      content: "";
      position: absolute;
      left: -10%;
      right: -10%;
      top: 50%;
      height: 2px;
      background: linear-gradient(90deg,
        transparent,
        var(--gold) 30%,
        var(--gold-bright) 50%,
        var(--gold) 70%,
        transparent
      );
      background-size: 200% 100%;
      animation: goldLineFlow 4s ease-in-out infinite;
      transform: translateY(-50%);
    }

    @keyframes goldLineFlow {
      0% { background-position: 100% 0; }
      50% { background-position: 0% 0; }
      100% { background-position: 100% 0; }
    }

    /* ====== Grid ====== */
    .grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }

    /* ====== Cards ====== */
    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(92, 124, 186, 0.30);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      will-change: transform;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--gold);
    }

    .card:focus-within {
      box-shadow: var(--shadow-md), var(--ring);
    }

    /* all cards have gold left line */
    .card.small::before,
    .card.wide::before,
    .card.tall::before,
    .card.full::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      background: linear-gradient(180deg, rgba(201, 168, 76, 0.95), rgba(201, 168, 76, 0.25));
      z-index: 10;
    }

    /* Background image container */
    .cardBg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Gradient overlay for readability */
    .cardBg::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.1) 0%,
        rgba(255, 255, 255, 0.3) 50%,
        rgba(255, 255, 255, 0.85) 100%
      );
    }

    /* Card without image - subtle blue + sakura pattern */
    .card.no-image::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      left: -120px;
      top: -120px;
      background: radial-gradient(circle at 60% 60%, rgba(92, 124, 186, 0.15), var(--sakura-soft) 40%, transparent 60%);
      transform: rotate(12deg);
      pointer-events: none;
    }

    /* Card content */
    .cardContent {
      position: relative;
      z-index: 5;
      padding: 16px;
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Icon (shown when no background image or as small badge) */
    .icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(92, 124, 186, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: 0 0 auto;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .iconFallback {
      font-weight: 900;
      font-size: 14px;
      color: var(--primary-dark);
    }

    .labelWrap {
      flex: 1;
    }

    .label {
      font-size: 20px;
      font-weight: 900;
      color: var(--primary-dark);
      line-height: 1.2;
      text-shadow: 0 1px 4px rgba(255, 255, 255, 1), 0 0px 8px rgba(255, 255, 255, 0.7);
    }

    .desc {
      margin-top: 4px;
      font-size: 14px;
      color: var(--text-sub);
      text-shadow: 0 1px 4px rgba(255, 255, 255, 1), 0 0px 8px rgba(255, 255, 255, 0.7);
    }

    .cardLink {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      outline: none;
      z-index: 20;
    }

    .cardLink:focus-visible {
      box-shadow: var(--ring);
    }

    /* Layout sizes -> 12-col grid */
    .small {
      grid-column: span 4;
      min-height: 140px;
    }

    .wide {
      grid-column: span 8;
      min-height: 140px;
    }

    .tall {
      grid-column: span 4;
      min-height: 280px;
    }

    .full {
      grid-column: span 12;
      min-height: 140px;
    }

    /* ====== Empty State ====== */
    .empty {
      grid-column: span 12;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-sub);
    }

    .empty h2 {
      color: var(--primary-dark);
      margin: 0 0 12px;
    }

    /* ====== Footer ====== */
    .footer {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--text-sub);
      font-size: 12px;
      padding: 0 4px;
    }

    .footerBrand {
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* ====== Responsive ====== */
    @media (max-width: 900px) {
      .small {
        grid-column: span 6;
      }

      .wide {
        grid-column: span 12;
      }

      .tall {
        grid-column: span 6;
        min-height: 220px;
      }
    }

    @media (max-width: 560px) {
      .headerRow {
        flex-direction: column;
        align-items: flex-start;
      }

      .title {
        font-size: 16px;
      }

      .small,
      .wide,
      .tall,
      .full {
        grid-column: span 12;
        min-height: 120px;
      }

      .tall {
        min-height: 160px;
      }

      .footer {
        flex-direction: column;
        gap: 4px;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .card,
      .btn {
        transition: none;
      }

      .card:hover,
      .btn:hover {
        transform: none;
      }

      .flow::before,
      .flow::after {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- Header -->
    <header class="header">
      <div class="headerRow">
        <? if (portalUrl) { ?>
          <a class="btn" href="<?= portalUrl ?>" target="_blank" rel="noopener">
            <span aria-hidden="true">&#127968;</span> 社内ポータルへ
          </a>
        <? } else { ?>
          <div></div>
        <? } ?>

        <div class="title">
          <?= dashboardTitle ?>
          <span class="badge">WebPortal</span>
          <div class="headerBrand">SAKURAI DENSO</div>
        </div>
      </div>
      <div class="flow" aria-hidden="true"></div>
    </header>

    <!-- Main Grid -->
    <main class="grid" id="grid">
      <? if (hasApps) { ?>
        <? for (var i = 0; i < apps.length; i++) { ?>
          <? var a = apps[i]; ?>
          <section class="card <?= a.layout ?> <?= a.iconUrl ? '' : 'no-image' ?>" aria-label="<?= a.label ?>">
            <a class="cardLink"
               href="<?= a.url ?>"
               target="<?= a.openMode === 'same_tab' ? '_self' : '_blank' ?>"
               rel="noopener"
               title="<?= a.note ? a.note : a.label ?>"></a>

            <? if (a.iconUrl) { ?>
              <!-- Background image -->
              <div class="cardBg" style="background-image: url('<?= a.iconUrl ?>');"></div>
            <? } ?>

            <div class="cardContent">
              <? if (!a.iconUrl) { ?>
                <!-- Fallback icon when no image -->
                <div class="icon" aria-hidden="true">
                  <span class="iconFallback"><?= a.label.substring(0, 2) ?></span>
                </div>
              <? } ?>

              <div class="labelWrap">
                <div class="label"><?= a.label ?></div>
                <? if (a.note) { ?>
                  <div class="desc"><?= a.note ?></div>
                <? } ?>
              </div>
            </div>
          </section>
        <? } ?>
      <? } else { ?>
        <div class="empty">
          <h2>表示できるアプリがありません</h2>
          <p>APP_MASTERシートにアプリを追加し、<br>enabled=TRUE かつ status=OK に設定してください。</p>
        </div>
      <? } ?>
    </main>

    <!-- Footer -->
    <div class="footer">
      <div>※ ボタンは別タブで開きます（既定）</div>
      <div>更新：<?= lastUpdated ?></div>
      <div class="footerBrand">桜井電装 Team Dashboard</div>
    </div>

  </div>
</body>
</html>
